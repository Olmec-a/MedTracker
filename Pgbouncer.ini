; pgbouncer.ini — пул соединений между API/Worker и Postgres.
;
; Зачем нужен: без пулинга 4 пода × ~30 worker'ов = 120+ соединений к Postgres,
; который держит максимум 100 (default max_connections), и отказывает остальным
; с "FATAL: sorry, too many clients already".
;
; С pgbouncer: 1000+ клиентских соединений мультиплексируются в ~20 серверных.
;
; Два логических подключения к одной физической БД:
;   medtracker        — transaction mode для основного трафика API (EF Core CRUD).
;   medtracker_admin  — session mode для Hangfire (LISTEN/NOTIFY) и dotnet ef.

[databases]
medtracker = host=medtracker-db port=5432 dbname=medtracker pool_mode=transaction
medtracker_admin = host=medtracker-db port=5432 dbname=medtracker pool_mode=session

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432

; Аутентификация: используем md5 (или scram-sha-256, см. ниже).
; edoburu/pgbouncer-образ автоматически генерирует userlist.txt из
; env-переменных DB_USER / DB_PASSWORD на старте, поэтому здесь только
; указываем тип аутентификации.
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt
admin_users = postgres

; Глобальный режим (переопределяется per-database в [databases])
pool_mode = transaction

; Сколько серверных соединений к Postgres на одну (user, dbname) пару
default_pool_size = 20
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 3

; Сколько клиентских соединений pgbouncer может принять суммарно
max_client_conn = 1000

; Lifecycle серверных соединений
server_lifetime = 3600
server_idle_timeout = 600

; Логирование (минимальное, чтобы не шуметь)
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1

; TLS отключён — внутри docker-сети plaintext безопасен
server_tls_sslmode = disable
client_tls_sslmode = disable

; Prepared statements от Npgsql (pgbouncer 1.21+ умеет в transaction mode)
max_prepared_statements = 100

; ignore_startup_parameters: некоторые клиенты шлют SET-параметры на старте,
; которых нет в whitelist'е. Без этого pgbouncer отвергнет соединение.
ignore_startup_parameters = extra_float_digits,search_path,application_name