services:
  medtracker-db:
    image: postgres:16-alpine
    container_name: medtracker-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?missing}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?missing}
      POSTGRES_DB: ${POSTGRES_DB:?missing}
    ports:
      - "5434:5432"
    volumes:
      - medtracker-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  medtracker-redis:
    image: redis:7-alpine
    container_name: medtracker-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - medtracker-redis-data:/data
    # AOF persistence: чтобы DataProtection-ключи переживали перезапуск Redis.
    # Иначе при рестарте контейнера выданные ранее protected payloads инвалидируются.
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  medtracker-api:
    build:
      context: .
      dockerfile: MedTracker.Grpc/Dockerfile
    # container_name УБРАН — конфликтует с `docker compose up --scale medtracker-api=N`
    restart: unless-stopped
    # ports УБРАНЫ — при scale>1 нельзя мапить один host-порт на несколько контейнеров.
    # Внешний доступ теперь через nginx ниже.
    expose:
      - "5001"
      - "5003"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=medtracker-db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      ConnectionStrings__Redis: "medtracker-redis:6379"
      Jwt__Secret: ${JWT_SECRET:?missing}
      Jwt__Issuer: ${JWT_ISSUER:-MedTracker}
      Jwt__Audience: ${JWT_AUDIENCE:-MedTrackerClients}
      Jwt__AccessTokenLifetimeMinutes: ${JWT_ACCESS_TOKEN_LIFETIME_MINUTES:-15}
    # volumes УБРАНЫ:
    #  - medtracker-keys не нужен (DataProtection-ключи в Redis)
    #  - medtracker-logs не нужен (Serilog пишет в stdout, читается через `docker logs`)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5003/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      medtracker-db:
        condition: service_healthy
      medtracker-redis:
        condition: service_healthy

  # nginx как L7 load balancer для gRPC (HTTP/2) и health-эндпоинтов.
  # Нужен потому что:
  #   1) docker compose port-mapping не работает с --scale>1
  #   2) gRPC поверх голого L4-балансировщика держит persistent connection
  #      на один под — размазывания нагрузки не будет.
  medtracker-lb:
    image: nginx:1.27-alpine
    container_name: medtracker-lb
    restart: unless-stopped
    ports:
      - "5001:5001"  # gRPC (HTTP/2)
      - "5003:5003"  # health/HTTP
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      medtracker-api:
        condition: service_started

volumes:
  medtracker-pgdata:
  medtracker-redis-data: