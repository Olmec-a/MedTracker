worker_processes auto;
events { worker_connections 1024; }

http {
    # Docker DNS resolver. valid=10s — кеш DNS на 10 секунд,
    # после чего nginx запросит DNS заново и подхватит изменения числа реплик.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ── gRPC listener (HTTP/2) ──
    server {
        listen 5001;
        http2 on;   # современная директива (вместо устаревшего `listen ... http2`)
        access_log /var/log/nginx/grpc-access.log;

        location / {
            # Резолвим хост через переменную — nginx делает DNS-lookup на каждый запрос
            # (с учётом TTL resolver'а). Это обходит ограничение `upstream ... resolve`,
            # которое в open-source nginx недоступно.
            #
            # Минус: нет load balancing-стратегий (least_conn и т.п.) — DNS просто
            # возвращает один из IP. Docker compose DNS делает round-robin между всеми
            # репликами, чего для большинства случаев достаточно.
            set $grpc_upstream "medtracker-api:5001";
            grpc_pass grpc://$grpc_upstream;

            grpc_read_timeout 300s;
            grpc_send_timeout 300s;
            client_max_body_size 50m;  # совпадает с MaxReceiveMessageSize в Program.cs
            grpc_set_header X-Real-IP $remote_addr;
            grpc_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # ── HTTP listener для health-эндпоинтов ──
    server {
        listen 5003;
        access_log /var/log/nginx/http-access.log;

        location / {
            set $http_upstream "medtracker-api:5003";
            proxy_pass http://$http_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}