syntax = "proto3";

option csharp_namespace = "MedTracker.Grpc.Protos";

package medtracker;

import "google/protobuf/empty.proto";
import "Protos/common.proto";

service MedicationCatalogService {
  rpc GetDiagnoses(google.protobuf.Empty) returns (DiagnosesListResponse);
  rpc GetMedicationsByDiagnosis(GetMedicationsRequest) returns (MedicationsListResponse);
  rpc GetSupplementsByMedication(GetSupplementsRequest) returns (SupplementsListResponse);
  rpc GetSideEffectsByMedication(GetSideEffectsRequest) returns (SideEffectsListResponse);
}

message GetMedicationsRequest {
  string diagnosis_id = 1;
  PaginationRequest pagination = 2;
}

message GetSupplementsRequest {
  string medication_id = 1;
  PaginationRequest pagination = 2;
}

message GetSideEffectsRequest {
  string medication_id = 1;
  PaginationRequest pagination = 2;
}

message DiagnosisDto {
  string id = 1;
  string name = 2;
}

message DiagnosesListResponse {
  repeated DiagnosisDto diagnoses = 1;
}

message MedicationDto {
  string id = 1;
  string diagnosis_id = 2;
  string hormonal_group = 3;
  string inn = 4;
  string trade_name = 5;
  string dosage = 6;
  string form = 7;
  string frequency = 8;
  string diet = 9;
}

message MedicationsListResponse {
  repeated MedicationDto medications = 1;
  int32 total_count = 2;
}

message SupplementDto {
  string id = 1;
  string medication_id = 2;
  string name = 3;
  string dosage = 4;
  string frequency = 5;
}

message SupplementsListResponse {
  repeated SupplementDto supplements = 1;
  int32 total_count = 2;
}

message SideEffectDto {
  string id = 1;
  string medication_id = 2;
  string name = 3;
}

message SideEffectsListResponse {
  repeated SideEffectDto side_effects = 1;
  int32 total_count = 2;
}
