syntax = "proto3";

option csharp_namespace = "MedTracker.Grpc.Protos";

package medtracker;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

service UserProfileService {
  rpc GetProfile(google.protobuf.Empty) returns (UserProfileResponse);
  rpc UpdateProfile(UpdateProfileRequest) returns (UserProfileResponse);
  rpc AssignDiagnoses(AssignDiagnosesRequest) returns (UserDiagnosesResponse);
  rpc GetMyDiagnoses(google.protobuf.Empty) returns (UserDiagnosesResponse);
}

message UserProfileResponse {
  string id = 1;
  // login → email (поле №2 сохранено, чтобы не двигать остальные индексы)
  string email = 2;
  string full_name = 3;
  int32 age = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
  // Новое поле: статус подтверждения email
  bool email_confirmed = 7;
}

message UpdateProfileRequest {
  string full_name = 1;
  int32 age = 2;
}

message AssignDiagnosesRequest {
  repeated string diagnosis_ids = 1;
}

message UserDiagnosesResponse {
  repeated UserDiagnosisDto diagnoses = 1;
}

message UserDiagnosisDto {
  string diagnosis_id = 1;
  string diagnosis_name = 2;
  google.protobuf.Timestamp assigned_at = 3;
}
