syntax = "proto3";

option csharp_namespace = "MedTracker.Grpc.Protos";

package medtracker;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";
import "common.proto";

service ExternalMedicationService {
  rpc AddExternalMedication(AddExternalMedRequest) returns (ExternalMedResponse);
  rpc GetMyExternalMedications(ExternalMedsQuery) returns (ExternalMedsListResponse);
  rpc DeleteExternalMedication(DeleteExternalMedRequest) returns (google.protobuf.Empty);
}

message AddExternalMedRequest {
  string name = 1;
  string dosage = 2;
  google.protobuf.Timestamp date = 3;
  google.protobuf.StringValue comment = 4;
}

message ExternalMedResponse {
  string id = 1;
  string name = 2;
  string dosage = 3;
  google.protobuf.Timestamp date = 4;
  string comment = 5;
}

message ExternalMedsQuery {
  DateRangeFilter date_range = 1;
  PaginationRequest pagination = 2;
}

message ExternalMedsListResponse {
  repeated ExternalMedResponse medications = 1;
  int32 total_count = 2;
}

message DeleteExternalMedRequest {
  string id = 1;
}
